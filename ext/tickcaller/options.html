<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TickCaller settings</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 420px;
        margin: 40px auto;
        padding: 0 20px;
        background: #1a1d23;
        color: #e4e6eb;
      }
      h1 { font-size: 18px; margin: 0 0 6px; }
      p { color: #8a9199; font-size: 13px; margin: 0 0 24px; }
      label {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a9199;
        margin: 16px 0 4px;
      }
      input {
        width: 100%;
        padding: 9px 10px;
        background: #2a2e36;
        color: #e4e6eb;
        border: 1px solid #3a3f48;
        border-radius: 6px;
        font-size: 13px;
        font-family: "IBM Plex Mono", monospace;
        box-sizing: border-box;
      }
      button {
        background: #3b82f6;
        color: white;
        border: 0;
        padding: 10px 18px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        margin-top: 20px;
      }
      button:hover { background: #2563eb; }
      .btn-secondary {
        background: #2a2e36;
        color: #e4e6eb;
        border: 1px solid #3a3f48;
      }
      .btn-secondary:hover { background: #323740; }
      #saved { color: #10b981; font-size: 12px; margin-left: 12px; opacity: 0; transition: opacity 0.2s; }
      #saved.show { opacity: 1; }
      .section {
        margin-top: 36px;
        padding-top: 20px;
        border-top: 1px solid #3a3f48;
      }
    </style>
  </head>
  <body>
    <h1>TickCaller</h1>
    <p>Connect to your tick agent's call server (via cloudflared tunnel).</p>

    <label for="server-url">Server URL</label>
    <input id="server-url" type="url" placeholder="https://your-tunnel.trycloudflare.com" />

    <label for="token">Auth token</label>
    <input id="token" type="password" placeholder="shared secret" />

    <button id="save">Save</button>
    <span id="saved">Saved</span>

    <div class="section">
      <label style="margin-top: 0;">Microphone access</label>
      <p style="margin-bottom: 12px;">Grant once so the extension can capture your mic during calls.</p>
      <button id="grant-mic" class="btn-secondary">Grant microphone access</button>
      <span id="mic-status" style="margin-left: 12px; font-size: 12px; color: #8a9199;"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
