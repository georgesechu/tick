<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TickCaller</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="topbar">
      <h1>TickCaller</h1>
      <button id="settings-btn" class="icon-btn" title="Settings">&#9881;</button>
    </div>

    <div id="config-missing" class="hidden">
      <p>Not configured yet.</p>
      <button id="open-options">Open settings</button>
    </div>

    <div id="idle-view" class="panel hidden">
      <div id="tab-info" class="tab-info"></div>
      <button id="call-btn" class="call-btn">Call Johan</button>
    </div>

    <div id="active-view" class="panel hidden">
      <div class="rec-indicator">
        <span class="rec-dot"></span>
        <span id="elapsed">0:00</span>
      </div>
      <div id="tab-label" class="tab-info"></div>
      <div id="rec-meta" class="rec-meta"></div>
      <button id="end-btn" class="end-btn">End Call</button>
    </div>

    <div id="error" class="error hidden"></div>

    <script src="popup.js"></script>
  </body>
</html>
